<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>裤佬音乐网 | 沉浸式音乐体验</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(168, 85, 247, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.1) 0%, transparent 60%);
            pointer-events: none; z-index: 0;
        }
        .marquee-container {
            position: fixed; top: 0; left: 0; width: 100%; background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px); padding: 10px 0; z-index: 100; overflow: hidden;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .marquee {
            white-space: nowrap; display: inline-block; animation: marquee 22s linear infinite; padding-left: 100%;
        }
        .marquee a {
            color: #fff; font-weight: bold; text-decoration: none; padding: 0 30px; font-size: 16px;
            display: inline-block; background: rgba(168, 85, 247, 0.3); border-radius: 30px; margin: 0 5px; transition: all 0.2s;
        }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        .glass-modern {
            background: rgba(15, 12, 41, 0.6); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .rotate-slow { animation: spin 20s linear infinite; }
        .song-list::-webkit-scrollbar { width: 4px; }
        .song-list::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 10px; }
        .song-list::-webkit-scrollbar-thumb { background: rgba(168, 85, 247, 0.5); border-radius: 10px; }
        .loader {
            width: 40px; height: 40px; border: 3px solid rgba(168, 85, 247, 0.3);
            border-top-color: #a855f7; border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        .quality-btn-active {
            background: linear-gradient(135deg, #a855f7, #ec489a);
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
        }
        .song-item { transition: all 0.2s ease; }
        .song-item:hover {
            background: linear-gradient(90deg, rgba(168, 85, 247, 0.2), rgba(236, 72, 153, 0.1));
            transform: translateX(4px);
        }
        /* 新增点击反馈 */
        .song-item:active { transform: scale(0.98); }
        .main-content { padding-top: 85px; }
        .main-title { font-size: 4rem; letter-spacing: -0.02em; }
        @media (max-width: 768px) {
            .main-title { font-size: 2.8rem; }
            .main-content { padding-top: 90px; }
        }
    </style>
</head>
<body>
    <div class="marquee-container">
        <div class="marquee">
            <a href="https://kelayun.notepin.co" target="_blank">🔥 裤佬音乐 🔥</a>
            <a href="https://kelayun.notepin.co" target="_blank">🎵 裤佬音乐网 · 用心聆听每一刻 🎵</a>
        </div>
    </div>

    <div id="app" class="relative z-10 max-w-6xl mx-auto px-4 py-6 md:py-8 main-content">
        <div class="text-center mb-10">
            <!--h1 class="main-title font-bold bg-gradient-to-r from-purple-400 via-pink-500 to-purple-400 bg-clip-text text-transparent">裤佬音乐网</h1--></br>
            <p class="text-white/60 text-base">基于QQ音乐 · 高清无损 · 沉浸聆听</p>
        </div>

        <div class="glass-modern rounded-2xl p-6 mb-6">
            <div class="flex justify-between items-center mb-6 flex-wrap gap-3">
                <div class="text-white/80 flex items-center gap-2">音质：
                    <button v-for="q in qualities" :key="q.value" @click="currentQuality = q.value; if(currentSong) playSong(currentSong)" 
                        class="px-4 py-1.5 rounded-full text-sm transition-all" 
                        :class="currentQuality === q.value ? 'quality-btn-active text-white' : 'bg-white/10 text-white/70'">
                        {{ q.label }}
                    </button>
                </div>
            </div>

            <div class="flex flex-col md:flex-row gap-4">
                <input v-model="keyword" @keyup.enter="searchMusic" type="text" placeholder="搜索歌名、歌手..." 
                    class="flex-1 px-4 py-3.5 rounded-xl bg-white/10 border border-white/20 text-white outline-none focus:border-purple-500">
                <button @click="searchMusic" :disabled="loading" class="bg-gradient-to-r from-purple-600 to-pink-600 text-white px-8 py-3.5 rounded-xl font-semibold disabled:opacity-50">
                    {{ loading ? '搜索中...' : '🔍 搜索' }}
                </button>
            </div>
        </div>

        <div v-if="currentSong" class="glass-card rounded-2xl p-6 mb-6">
            <div class="flex flex-col md:flex-row items-center gap-6">
                <img :src="currentSong.cover" class="w-32 h-32 rounded-2xl rotate-slow shadow-2xl" @error="currentSong.cover = defaultCover">
                <div class="flex-1 w-full text-center md:text-left">
                    <h2 class="text-2xl font-bold text-white">{{ currentSong.name }}</h2>
                    <p class="text-white/70">{{ currentSong.artist }}</p>
                    <audio id="main-player" :src="currentPlayUrl" controls autoplay class="w-full mt-4" @error="onPlayError"></audio>
                    <p v-if="playError" class="text-amber-400 text-sm mt-2">⚠️ {{ playError }}</p>
                </div>
            </div>
        </div>

        <div class="glass-modern rounded-2xl overflow-hidden">
            <div class="p-4 border-b border-white/10 text-white font-semibold">搜索结果</div>
            <div v-if="songs.length" class="max-h-[500px] overflow-y-auto song-list">
                <div v-for="(song, idx) in songs" :key="song.id" @click="playSong(song)" 
                    class="song-item p-4 flex items-center gap-4 cursor-pointer border-b border-white/5"
                    :class="{'bg-purple-500/20': currentSong && currentSong.id === song.id}">
                    <span class="text-white/30 w-6">{{ idx + 1 }}</span>
                    <img :src="song.cover" class="w-12 h-12 rounded-lg" @error="song.cover = defaultCover">
                    <div class="flex-1">
                        <div class="text-white font-medium">{{ song.name }}</div>
                        <div class="text-white/50 text-xs">{{ song.artist }}</div>
                    </div>
                    <span class="text-white/30 text-xs">{{ song.duration }}</span>
                </div>
            </div>
            <div v-else class="p-20 text-center text-white/40">等待搜索音乐...</div>
        </div>

        <transition name="fade">
            <div v-if="message" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-purple-600 text-white px-6 py-2 rounded-full shadow-xl z-50">
                {{ message }}
            </div>
        </transition>
    </div>

    <script>
        const { createApp, ref, nextTick } = Vue;
        const PROXY = 'https://proxy.api.030101.xyz/';

        createApp({
            setup() {
                const keyword = ref('');
                const songs = ref([]);
                const loading = ref(false);
                const currentSong = ref(null);
                const currentPlayUrl = ref('');
                const playError = ref('');
                const message = ref('');
                const currentQuality = ref('128k');
                const defaultCover = 'https://y.gtimg.cn/music/photo_new/T002R300x300M000000MkMni19ClKG.jpg';
                const qualities = [
                    { value: '128k', label: '标准' },
                    { value: '320k', label: '极高' },
                    { value: 'flac', label: '无损' }
                ];

                const showMsg = (msg) => {
                    message.value = msg;
                    setTimeout(() => message.value = '', 2000);
                };

                const searchMusic = async () => {
                    if (!keyword.value.trim()) return;
                    loading.value = true;
                    try {
                        const res = await axios.post(PROXY + 'https://u.y.qq.com/cgi-bin/musicu.fcg', {
                            req_1: { method: "DoSearchForQQMusicDesktop", module: "music.search.SearchCgiService", param: { num_per_page: 25, page_num: 1, query: keyword.value, search_type: 0 } }
                        });
                        const list = res.data?.req_1?.data?.body?.song?.list || [];
                        songs.value = list.map(item => ({
                            id: item.id, mid: item.mid, name: item.name, artist: item.singer.map(s => s.name).join('/'),
                            cover: `https://y.gtimg.cn/music/photo_new/T002R300x300M000${item.album.mid}.jpg`,
                            duration: `${Math.floor(item.interval/60)}:${String(item.interval%60).padStart(2,'0')}`
                        }));
                        showMsg(`已为您找到 ${songs.value.length} 首歌曲`);
                    } catch (e) { showMsg('搜索出错了'); }
                    finally { loading.value = false; }
                };

                // 核心：改进后的立即播放函数
                const playSong = async (song) => {
                    currentSong.value = song;
                    playError.value = '';
                    showMsg(`正在为您加载: ${song.name}`);

                    try {
                        // 1. 获取 URL
                        const level = { '128k': 'standard', '320k': 'exhigh', 'flac': 'lossless' }[currentQuality.value];
                        const url = `https://music.nxinxz.com/kgqq/tx.php?id=${song.mid}&level=${level}&type=mp3`;
                        
                        // 2. 赋值并立即尝试播放
                        currentPlayUrl.value = url;

                        // 3. 关键：强制 DOM 刷新后执行播放指令
                        nextTick(() => {
                            const player = document.getElementById('main-player');
                            if (player) {
                                player.load(); // 重新加载新资源
                                const playPromise = player.play();
                                if (playPromise !== undefined) {
                                    playPromise.catch(e => {
                                        console.log("浏览器拦截自动播放，需手动点击播放");
                                        playError.value = "点击下方播放按钮开始聆听";
                                    });
                                }
                            }
                        });
                    } catch (err) {
                        playError.value = "播放失败，请尝试切换音质";
                    }
                };

                const onPlayError = () => { playError.value = "解析资源失败，请重试或切换音质"; };

                return {
                    keyword, songs, loading, currentSong, currentPlayUrl, playError, message,
                    currentQuality, qualities, defaultCover, searchMusic, playSong, onPlayError
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
